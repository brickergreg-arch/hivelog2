<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HiveLog</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#1a1208;color:#f5e6c8;margin:0;padding:10px}
h1{margin:10px 0}
.tabbar{display:flex;gap:8px;margin-bottom:10px}
button{background:#3a2812;color:#f5e6c8;border:none;padding:8px 10px;border-radius:4px}
.active{outline:2px solid gold}
.panel{background:#2b1e0e;padding:10px;border-radius:6px;margin-bottom:10px}
.box{margin:10px 0}
.box-title{font-size:12px;opacity:.8;margin-bottom:4px}
.row{display:flex;gap:4px}
.frame{flex:1;background:#3a2812;padding:8px;text-align:center;font-size:11px;cursor:pointer}
.selected{outline:2px solid gold}
input,textarea,select{width:100%;margin:6px 0;background:#3a2812;color:#f5e6c8;border:1px solid #444;padding:6px;border-radius:4px}
img{margin:2px;border-radius:4px}
</style>
</head>
<body>
<h1>🐝 HiveLog</h1>
<div class="tabbar">
<button onclick="show('hives')" id="t-hives" class="active">My Hives</button>
<button onclick="show('inspect')" id="t-inspect">Inspect</button>
<button onclick="show('history')" id="t-history">History</button>
</div>

<div id="hives" class="panel"></div>
<div id="inspect" class="panel" style="display:none"></div>
<div id="history" class="panel" style="display:none"></div>

<script>
let data={hives:[]};
let selectedHive=0;
let selectedFrames=new Set();
let tempPhotos=[];

function show(tab){
['hives','inspect','history'].forEach(id=>document.getElementById(id).style.display='none');
document.getElementById(tab).style.display='block';
document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
document.getElementById('t-'+tab).classList.add('active');
render();
}

function addHive(){
data.hives.push({name:'Hive '+(data.hives.length+1),boxes:[],history:[]});
selectedHive=data.hives.length-1;render();}

function addBox(){
let count=parseInt(document.getElementById('frameCount').value);
let frames=[];
for(let i=1;i<=count;i++)frames.push({id:Date.now()+i,name:'F'+i,editing:false});
data.hives[selectedHive].boxes.push(frames);
render();
}

function render(){renderHives();renderInspect();renderHistory();}

function renderHives(){
let el=document.getElementById('hives');
let h='<button onclick="addHive()">Add Hive</button>';

data.hives.forEach((hv,i)=>{
h+=`<div class='panel'><b onclick='selectedHive=${i};render()'>${hv.name}</b>`;

hv.boxes.forEach((box,b)=>{
h+=`<div class='box'><div class='box-title'>Box ${b+1}</div><div class='row'>`;
box.forEach(f=>{h+=`<div class='frame'>${f.name}</div>`;});
h+='</div></div>';
});

h+='</div>';
});
el.innerHTML=h;
}

function renderInspect(){
let hv=data.hives[selectedHive];
let el=document.getElementById('inspect');
if(!hv){el.innerHTML='Add hive first';return;}

let h=`<select id='frameCount'><option value='8'>8 Frames</option><option value='10'>10 Frames</option></select>
<button onclick='addBox()'>Add Box</button>
<button onclick='batchRename()'>Batch Rename</button>`;

hv.boxes.forEach((box,b)=>{
h+=`<div class='panel'><div class='box-title'>Box ${b+1}</div><div class='row'>`;

box.forEach(f=>{
h+=`<div class='frame ${selectedFrames.has(f.id)?'selected':''}' onclick='toggle(${f.id})' ondblclick='edit(${f.id})'>`;
if(f.editing){
h+=`<input value="${f.name}" onblur="saveFrame(${f.id},this.value)">`;
}else{h+=f.name;}
h+='</div>';
});
h+='</div></div>';
});

h+=`<textarea id='notes' placeholder='Notes'></textarea>
<input type='file' multiple accept='image/*' onchange='photos(event)'>
<button onclick='saveInspection()'>Save</button>`;

el.innerHTML=h;
}

function toggle(id){selectedFrames.has(id)?selectedFrames.delete(id):selectedFrames.add(id);render();}

function edit(id){data.hives[selectedHive].boxes.flat().forEach(f=>{if(f.id===id)f.editing=true});render();}

function saveFrame(id,val){data.hives[selectedHive].boxes.flat().forEach(f=>{if(f.id===id){f.name=val||f.name;f.editing=false}});render();}

function batchRename(){
let p=prompt('Prefix');if(!p)return;let i=1;
data.hives[selectedHive].boxes.flat().forEach(f=>{if(selectedFrames.has(f.id)){f.name=p+'-'+i++;}});
selectedFrames.clear();render();}

function photos(e){tempPhotos=[];Array.from(e.target.files).forEach(f=>{
let r=new FileReader();r.onload=()=>tempPhotos.push(r.result);r.readAsDataURL(f);
});}

function saveInspection(){
data.hives[selectedHive].history.push({date:new Date().toLocaleString(),notes:document.getElementById('notes').value,photos:[...tempPhotos]});
selectedFrames.clear();tempPhotos=[];render();}

function renderHistory(){
let hv=data.hives[selectedHive];
if(!hv){document.getElementById('history').innerHTML='';return;}
let h='';
hv.history.forEach(item=>{
h+=`<div class='panel'><b>${item.date}</b><br>${item.notes}<br>${item.photos.map(p=>`<img src="${p}" width=80>`).join('')}</div>`;
});
document.getElementById('history').innerHTML=h;
}

render();
</script>
</body>
</html>
