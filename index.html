<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HiveLog – Advanced Frame Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>HiveLog</h1>
        <button id="addHiveBtn">+ Hive</button>
      </header>

      <section class="hive-list" id="hiveList"></section>

      <section class="box-config">
        <h2>Box config</h2>
        <label>
          Box name:
          <input id="boxNameInput" type="text" placeholder="Deep A" />
        </label>
        <label>
          Frame count:
          <select id="frameCountSelect">
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>
          </select>
        </label>
        <button id="addBoxBtn">+ Box</button>
      </section>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h2 id="currentHiveTitle">No hive selected</h2>
          <p id="currentBoxTitle"></p>
        </div>
        <div class="inspection-meta">
          <label>
            Inspection date:
            <input id="inspectionDateInput" type="date" />
          </label>
          <label>
            Weather:
            <input id="weatherInput" type="text" placeholder="Sunny, 75°F" />
          </label>
          <label>
            Nectar flow:
            <input id="nectarInput" type="text" placeholder="Light / Moderate / Heavy" />
          </label>
          <label>
            Temperament:
            <input id="temperamentInput" type="text" placeholder="Calm / Defensive" />
          </label>
          <button id="saveInspectionBtn">Save inspection</button>
        </div>
      </header>

      <section class="content">
        <section class="box-overview">
          <h3>Frames overview</h3>
          <div id="frameGrid" class="frame-grid"></div>
        </section>

        <section class="frame-detail">
          <h3 id="frameDetailTitle">Select a frame</h3>
          <div class="frame-detail-body">
            <div class="frame-detail-column">
              <h4>Status tags</h4>
              <div id="statusTags" class="tags">
                <button data-tag="brood">Brood</button>
                <button data-tag="honey">Honey</button>
                <button data-tag="pollen">Pollen</button>
                <button data-tag="queen_cells">Queen cells</button>
                <button data-tag="comb_new">New comb</button>
                <button data-tag="comb_old">Old comb</button>
                <button data-tag="damage">Damage / cross comb</button>
              </div>

              <h4>Notes</h4>
              <textarea id="notesInput" rows="8"
                placeholder="Queen sighted, brood pattern, mites, odd behavior, repairs, feeding notes..."></textarea>
              <button id="saveFrameBtn">Save frame</button>
            </div>

            <div class="frame-detail-column">
              <h4>Frame photo</h4>
              <input id="photoInput" type="file" accept="image/*" />
              <div id="photoPreview" class="photo-preview">
                <span class="placeholder">No photo yet</span>
              </div>
            </div>
          </div>
        </section>

        <section class="inspection-timeline">
          <h3>Inspection history</h3>
          <div id="inspectionList" class="inspection-list"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
