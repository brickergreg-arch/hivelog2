<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HiveLog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>HiveLog</h1>
    <div class="controls">
      <label>
        Hive:
        <input type="text" id="hiveId" placeholder="Hive A" />
      </label>
      <label>
        Date:
        <input type="date" id="inspectionDate" />
      </label>
      <button id="newInspectionBtn">New Inspection</button>
      <button id="loadInspectionBtn">Load Inspection</button>
    </div>
  </header>

  <main>
    <section id="framesSection">
      <h2>Frames</h2>
      <div id="framesGrid"></div>
    </section>
  </main>

  <footer>
    <button id="saveBtn">Save Inspection</button>
    <span id="status"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
